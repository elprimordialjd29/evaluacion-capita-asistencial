<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluación Cápita Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --scroll-bg: #f1f5f9;
        --scroll-thumb: #cbd5e1;
        --scroll-thumb-hover: #94a3b8;
      }
      
      .dark {
        --scroll-bg: #020617;
        --scroll-thumb: #334155;
        --scroll-thumb-hover: #475569;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scroll-bg); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb); 
        border-radius: 5px;
        border: 2px solid var(--scroll-bg);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover); 
      }
      
      /* Glassmorphism Utilities */
      .glass-panel {
        @apply bg-white/80 dark:bg-slate-900/70 backdrop-blur-md border border-slate-200 dark:border-slate-800;
      }
      
      .custom-scroll {
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) var(--scroll-bg);
      }

      @media print {
        /* Hide everything except the acta preview */
        body > * { display: none !important; }
        #acta-print-portal { display: block !important; }

        #acta-preview-content {
          display: block !important;
          position: static !important;
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
          padding: 8mm !important;
          box-sizing: border-box !important;
          background: white !important;
          color: black !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          color-adjust: exact !important;
        }

        /* Images must render in print */
        #acta-preview-content img {
          display: block !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Background colors in cells must print */
        #acta-preview-content * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Page 2 forces a new page */
        .print-page-break { break-before: page !important; page-break-before: always !important; }

        /* Add top padding so page 2 border isn't clipped at the top */
        .print-page-break + div { margin-top: 8mm !important; }

        @page { margin: 0; size: letter portrait; }
      }
    </style>
  <script type="importmap">
{

  }
}
</script>
